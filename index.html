<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Portfolio | Troy Bohrer</title>
  </head>
  <body class="main-content">
    <header class="section sec1 header active"></header>
    <main>
      <section class="section sec2 about"></section>
      <section class="section sec3 portfolio"></section>
      <section class="section sec4 certificates"></section>
      <section class="section sec5 contact"></section>
    </main>

    <div class="controls">
      <div class="control control-1 active-btn">
        <i class="fa-solid fa-house"></i>
      </div>
      <div class="control control-2 active-btn" data-id="about">
        <i class="fa-solid fa-user"></i>
      </div>
      <div class="control control-3 active-btn" data-id="projects">
        <i class="fa-solid fa-folder"></i>
      </div>
      <div class="control control-4 active-btn" data-id="certs">
        <i class="fa-solid fa-award"></i>
      </div>
      <div class="control control-5 active-btn" data-id="contact">
        <i class="fa-solid fa-address-book"></i>
    </div>
  </body>
</html>
